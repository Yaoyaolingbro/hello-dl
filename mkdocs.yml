      - 矩阵运算与性质: 01-math/linear-algebra/matrix-ops.md
      - 特殊矩阵: 01-math/linear-algebra/special-matrices.md
      - 矩阵求导: 01-math/linear-algebra/matrix-calculus.md
      - 链式法则（矩阵形式）: 01-math/linear-algebra/chain-rule.md
      - 特征值分解: 01-math/linear-algebra/eigenvalue.md
      - SVD 与低秩近似: 01-math/linear-algebra/svd.md
    - 概率论:
      - 01-math/probability/index.md
      - 概率基础: 01-math/probability/basics.md
      - 随机变量: 01-math/probability/random-variables.md
      - 常用分布: 01-math/probability/distributions.md
      - 期望与方差: 01-math/probability/expectation-variance.md
      - 贝叶斯推断: 01-math/probability/bayesian.md
      - 信息论: 01-math/probability/information-theory.md
    - 优化理论:
