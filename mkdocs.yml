      - 凸集与凸函数: 01-math/optimization/convex-basics.md
      - 一阶最优性: 01-math/optimization/first-order.md
      - 二阶条件与曲率: 01-math/optimization/second-order.md
      - 梯度下降与收敛性: 01-math/optimization/gradient-descent.md
      - 自适应优化方法: 01-math/optimization/adaptive-methods.md
      - 拉格朗日乘子与 KKT: 01-math/optimization/lagrangian.md

  - Part 2 · 基础深度学习:
