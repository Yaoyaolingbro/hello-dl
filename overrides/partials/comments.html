{% if page.meta.comments %}
<h2 id="__comments">{{ lang.t("meta.comments") }}</h2>

<!-- Giscus 评论区 —— 如何激活：
     1. 在 GitHub 仓库 Settings → Features → Discussions 里打开 Discussions
     2. 访问 https://giscus.app/ ，选择你的仓库，复制生成的 data-repo-id 和 data-category-id
     3. 把下面 YOUR_REPO_ID 和 YOUR_CATEGORY_ID 替换成真实值
-->
<script
  src="https://giscus.app/client.js"
  data-repo="Yaoyaolingbro/hello-dl"
  data-repo-id="YOUR_REPO_ID"
  data-category="General"
  data-category-id="YOUR_CATEGORY_ID"
  data-mapping="pathname"
  data-strict="0"
  data-reactions-enabled="1"
  data-emit-metadata="0"
  data-input-position="top"
  data-theme="preferred_color_scheme"
  data-lang="zh-CN"
  data-loading="lazy"
  crossorigin="anonymous"
  async>
</script>

<!-- 跟随 Material 主题的亮/暗切换 -->
<script>
  var giscus = document.querySelector("script[src*='giscus']");
  document.addEventListener("DOMContentLoaded", function() {
    var palette = __md_get("__palette");
    if (palette && typeof palette.color === "object") {
      var theme = palette.color.scheme === "slate" ? "dark" : "light";
      giscus.setAttribute("data-theme", theme);
    }
  });

  // 监听主题切换事件，实时同步 Giscus 主题
  var ref = document.querySelector("[data-md-component=palette]");
  if (ref) {
    ref.addEventListener("change", function() {
      var palette = __md_get("__palette");
      if (palette && typeof palette.color === "object") {
        var theme = palette.color.scheme === "slate" ? "dark" : "light";
        var frame = document.querySelector(".giscus-frame");
        if (frame) {
          frame.contentWindow.postMessage(
            { giscus: { setConfig: { theme: theme } } },
            "https://giscus.app"
          );
        }
      }
    });
  }
</script>
{% endif %}
